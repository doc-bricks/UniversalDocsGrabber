name: source-platform-smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run focused smoke checks
        run: |
          python tests/source_platform_smoke.py
          python -m pytest -q tests/test_core.py tests/test_export_format.py tests/test_migration_features.py
